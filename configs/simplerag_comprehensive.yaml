# Simple RAG Configuration Example with Comprehensive Dataset
# Run with: python cli.py --config configs/simplerag_comprehensive.yaml

system:
  name: simplerag
  args:
    model_name: Qwen/Qwen3-0.6B  # Larger model for better performance
    # device is auto-detected (CUDA if available, otherwise CPU)

dataset: datasets/comprehensive.json
output: results/simplerag_comprehensive
